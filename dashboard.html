<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Shopzone - Lead Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff8c00;
            --secondary: #d4af37;
            --dark: #0f0f0f;
            --light: #1a1a2e;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .refresh-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--light);
            border: 1px solid rgba(255, 140, 0, 0.2);
            padding: 25px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.1);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-change {
            font-size: 0.85rem;
            color: #22c55e;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .chart-card {
            background: var(--light);
            border: 1px solid rgba(255, 140, 0, 0.2);
            padding: 25px;
            border-radius: 12px;
        }

        .chart-card h3 {
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.1rem;
        }

        .quality-bar {
            display: flex;
            gap: 2px;
            height: 40px;
            margin: 20px 0;
            border-radius: 6px;
            overflow: hidden;
        }

        .quality-segment {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quality-segment:hover {
            filter: brightness(1.2);
        }

        .quality-hot {
            background: #ef4444;
        }

        .quality-warm {
            background: #f97316;
        }

        .quality-cool {
            background: #3b82f6;
        }

        .quality-cold {
            background: #64748b;
        }

        .leads-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .leads-table th {
            background: rgba(255, 140, 0, 0.1);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--primary);
        }

        .leads-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 140, 0, 0.1);
        }

        .leads-table tr:hover {
            background: rgba(255, 140, 0, 0.05);
        }

        .quality-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-hot {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .badge-warm {
            background: rgba(249, 115, 22, 0.2);
            color: #fdba74;
        }

        .badge-cool {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .badge-cold {
            background: rgba(100, 116, 139, 0.2);
            color: #cbd5e1;
        }

        .export-btn {
            background: var(--secondary);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin: 20px 0;
            transition: transform 0.2s;
        }

        .export-btn:hover {
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .spinner {
            border: 3px solid rgba(255, 140, 0, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .leads-table {
                font-size: 0.9rem;
            }

            .stat-value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Lead Analytics Dashboard</h1>
            <button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Leads</div>
                <div class="stat-value" id="totalLeads">0</div>
                <div class="stat-change">↑ This month</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Conversion Rate</div>
                <div class="stat-value" id="conversionRate">0%</div>
                <div class="stat-change">from visitors</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Lead Score</div>
                <div class="stat-value" id="avgScore">0</div>
                <div class="stat-change">/100</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Hot Leads</div>
                <div class="stat-value" id="hotLeads" style="color: #ef4444;">0</div>
                <div class="stat-change">Ready to close</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <!-- Lead Quality Distribution -->
            <div class="chart-card">
                <h3>Lead Quality Distribution</h3>
                <div class="quality-bar">
                    <div class="quality-segment quality-hot" id="hotPercent" title="Hot Leads">
                        <span id="hotPercentText">0%</span>
                    </div>
                    <div class="quality-segment quality-warm" id="warmPercent" title="Warm Leads">
                        <span id="warmPercentText">0%</span>
                    </div>
                    <div class="quality-segment quality-cool" id="coolPercent" title="Cool Leads">
                        <span id="coolPercentText">0%</span>
                    </div>
                    <div class="quality-segment quality-cold" id="coldPercent" title="Cold Leads">
                        <span id="coldPercentText">0%</span>
                    </div>
                </div>
                <div style="margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>🔥 Hot</span> <span id="hotCount">0</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>☀️ Warm</span> <span id="warmCount">0</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>❄️ Cool</span> <span id="coolCount">0</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>❓ Cold</span> <span id="coldCount">0</span>
                    </div>
                </div>
            </div>

            <!-- Top Services -->
            <div class="chart-card">
                <h3>Top Services Requested</h3>
                <div id="topServicesContainer" style="margin-top: 20px;">
                    <!-- Will be populated by JS -->
                </div>
            </div>
        </div>

        <!-- Recent Leads -->
        <div class="chart-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Recent High-Value Leads</h3>
                <button class="export-btn" onclick="exportLeads('csv')">📥 Export CSV</button>
            </div>
            <div id="leadsContainer" class="loading">
                <div class="spinner"></div>
                <p>Loading leads...</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchAnalytics() {
            try {
                const response = await fetch('/api/analytics');
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error('Failed to fetch analytics:', error);
            }
        }

        async function fetchLeads() {
            try {
                const response = await fetch('/api/leads');
                const data = await response.json();
                displayLeads(data.leads);
                updateLeadStats(data);
            } catch (error) {
                console.error('Failed to fetch leads:', error);
            }
        }

        function updateDashboard(data) {
            document.getElementById('totalLeads').textContent = data.totalLeads || 0;
            document.getElementById('conversionRate').textContent = data.conversionRate + '%';
            document.getElementById('avgScore').textContent = data.avgEngagementScore || 0;

            const qualities = data.leadsByQuality || {};
            document.getElementById('hotLeads').textContent = qualities.hot || 0;

            // Update quality distribution
            const total = (qualities.hot || 0) + (qualities.warm || 0) + (qualities.cool || 0) + (qualities.cold || 0);
            const hotPct = total > 0 ? Math.round((qualities.hot / total) * 100) : 0;
            const warmPct = total > 0 ? Math.round((qualities.warm / total) * 100) : 0;
            const coolPct = total > 0 ? Math.round((qualities.cool / total) * 100) : 0;
            const coldPct = total > 0 ? Math.round((qualities.cold / total) * 100) : 0;

            document.getElementById('hotPercent').style.flex = Math.max(1, hotPct);
            document.getElementById('warmPercent').style.flex = Math.max(1, warmPct);
            document.getElementById('coolPercent').style.flex = Math.max(1, coolPct);
            document.getElementById('coldPercent').style.flex = Math.max(1, coldPct);

            document.getElementById('hotPercentText').textContent = hotPct > 5 ? hotPct + '%' : '';
            document.getElementById('warmPercentText').textContent = warmPct > 5 ? warmPct + '%' : '';
            document.getElementById('coolPercentText').textContent = coolPct > 5 ? coolPct + '%' : '';
            document.getElementById('coldPercentText').textContent = coldPct > 5 ? coldPct + '%' : '';

            document.getElementById('hotCount').textContent = qualities.hot || 0;
            document.getElementById('warmCount').textContent = qualities.warm || 0;
            document.getElementById('coolCount').textContent = qualities.cool || 0;
            document.getElementById('coldCount').textContent = qualities.cold || 0;

            // Update top services
            const services = data.topServices || [];
            const servicesHTML = services.map(([service, count]) => `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <span style="font-weight: 500;">${service}</span>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: ${count * 30}px; height: 8px; background: var(--primary); border-radius: 4px;"></div>
                        <span style="color: var(--primary); font-weight: 600;">${count}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('topServicesContainer').innerHTML = servicesHTML || '<p>No data yet</p>';
        }

        function updateLeadStats(data) {
            const qualities = data.leadsByQuality || {};
            const total = Object.values(qualities).reduce((a, b) => a + b, 0);

            if (total === 0) {
                document.getElementById('totalLeads').textContent = '0';
                document.getElementById('conversionRate').textContent = '0%';
                document.getElementById('avgScore').textContent = '0';
            }
        }

        function displayLeads(leads) {
            if (!leads || leads.length === 0) {
                document.getElementById('leadsContainer').innerHTML = '<p style="text-align: center; padding: 40px; color: #94a3b8;">No leads captured yet</p>';
                return;
            }

            const hotLeads = leads.filter(l => l.quality === 'hot' || l.quality === 'warm').sort((a, b) => b.score - a.score).slice(0, 20);

            const tableHTML = `
                <table class="leads-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Service</th>
                            <th>Score</th>
                            <th>Quality</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${hotLeads.map(lead => `
                            <tr>
                                <td>${lead.name || 'N/A'}</td>
                                <td><a href="mailto:${lead.email}" style="color: var(--primary); text-decoration: none;">${lead.email}</a></td>
                                <td>${lead.service || 'N/A'}</td>
                                <td><strong>${lead.score}/100</strong></td>
                                <td><span class="quality-badge badge-${lead.quality}">${lead.quality.toUpperCase()}</span></td>
                                <td>${new Date(lead.timestamp).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('leadsContainer').innerHTML = tableHTML;
        }

        function refreshData() {
            document.getElementById('leadsContainer').innerHTML = '<div class="loading"><div class="spinner"></div><p>Refreshing...</p></div>';
            fetchAnalytics();
            fetchLeads();
        }

        function exportLeads(format) {
            console.log('Exporting leads as', format);
            // Implementation depends on backend export endpoint
        }

        // Load data on page load
        window.addEventListener('load', () => {
            fetchAnalytics();
            fetchLeads();

            // Auto-refresh every 30 seconds
            setInterval(() => {
                fetchAnalytics();
                fetchLeads();
            }, 30000);
        });
    </script>
</body>
</html>
