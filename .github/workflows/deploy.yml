name: Deploy MK Shopzone AI Automation

on:
  push:
    branches: [ main, production ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      env:
        VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
        VITE_HUGGING_FACE_API: ${{ secrets.VITE_HUGGING_FACE_API }}

    - name: Run tests
      run: npm test 2>/dev/null || echo "No tests configured"

    - name: Check for vulnerabilities
      run: npm audit --audit-level=moderate || true

  deploy-frontend:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to Vercel
      uses: BetaHuhn/deploy-to-vercel-action@v1
      with:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        PRODUCTION: true

  deploy-backend:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to Railway
      uses: railway-app/deploy-action@v1
      with:
        token: ${{ secrets.RAILWAY_TOKEN }}
        service: mkshopzone-api
        environment: production

    - name: Verify deployment
      run: |
        sleep 10
        curl -f https://api.mkshopzone.com/api/health || exit 1

  notify-deployment:
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    if: success()

    steps:
    - name: Notify on Slack
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "✅ MK Shopzone Deployment Successful",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚀 Deployment Complete"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Frontend:*\nhttps://mkshopzone.com"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*API:*\nhttps://api.mkshopzone.com"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "Dashboard: https://mkshopzone.com/dashboard"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

